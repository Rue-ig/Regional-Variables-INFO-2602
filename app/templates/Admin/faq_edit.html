{# PATH: app/templates/Admin/faq_edit.html #}
{% extends "admin.html" %}

{% block admin_subcontent %}
<div class="p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0">FAQ Content Management</h4>
        <button class="btn btn-primary btn-sm d-flex align-items-center gap-2" data-bs-toggle="modal" data-bs-target="#addFaqModal">
            <span class="material-symbols-outlined">add</span> Add Question
        </button>
    </div>

    <div class="card border-0 shadow-sm" style="border-radius: 12px;">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th style="font-size: 12px; text-transform: uppercase; color: #6b7280;">Category</th>
                        <th style="font-size: 12px; text-transform: uppercase; color: #6b7280;">Question</th>
                        <th class="text-end"></th>
                    </tr>
                </thead>
                <tbody>
                    {% for faq in faqs %}
                    <tr>
                        <td><span class="badge bg-light text-dark border">{{ faq.category }}</span></td>
                        <td class="small fw-semibold">{{ faq.question }}</td>
                        <td class="text-end">
                            <span class="material-symbols-outlined text-muted" style="cursor: pointer;">more_vert</span>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="addFaqModal" tabindex="-1">
    <div class="modal-dialog">
        <form action="/admin/faq/add" method="POST" class="modal-content" style="border-radius: 15px;">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold">Add FAQ Item</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label small fw-bold">Category</label>
                    <select name="category" class="form-select">
                        <option>Using the platform</option>
                        <option>Accounts & profiles</option>
                        <option>Submitting & editing events</option>
                        <option>Privacy & data</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Question</label>
                    <input type="text" name="question" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Answer</label>
                    <textarea name="answer" class="form-control" rows="4" required></textarea>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button type="submit" class="btn btn-primary w-100">Save and Publish</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
