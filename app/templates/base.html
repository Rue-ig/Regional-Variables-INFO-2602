{# PATH: app/templates/base.html #}
<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1f35">
    <title>{% block title %}{% endblock %} DWIVE</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='img/sunset_7739495.png') }}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet">

    <style>
        :root {
            --cb-deep: #0d1f35;
            --cb-ocean: #0a3a5c;
            --cb-water: #0e6e96;
            --cb-teal: #00b4d8;
            --cb-coral: #ff6b35;
            --cb-coral-dim: rgba(255, 107, 53, .15);
            --cb-sand: #fafafa;
            --cb-sidebar-w: 260px;
            --cb-topbar-h: 62px;
            --transition: 0.25s cubic-bezier(.4, 0, .2, 1);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .toast-container {
            z-index: 9999;
        }

        .toast {
            border: none !important;
            border-radius: 12px !important;
            box-shadow: 0 8px 30px rgba(0, 0, 0, .18) !important;
            min-width: 280px;
        }

        .toast-header {
            background: var(--cb-deep) !important;
            color: #fff !important;
            border-radius: 12px 12px 0 0 !important;
            border: none !important;
        }

        .toast-header .btn-close {
            filter: invert(1);
        }

        .toast-body {
            background: #fff;
            border-radius: 0 0 12px 12px;
            font-size: 14px;
        }

        a {
            transition: color var(--transition);
        }
    </style>

    <link href="{{ url_for('static', path='css/app.css') }}" rel="stylesheet">
    {% block external_css %}{% endblock %}
    {% block internal_css %}{% endblock %}
</head>

<body>
    {% block content %}{% endblock %}

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="appToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-autohide="true"
            data-bs-delay="3000">
            <div class="toast-header">
                <span class="material-symbols-outlined me-2" style="font-size:18px">notifications</span>
                <strong class="me-auto" id="toastTitle">Notice</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body" id="toastContent"></div>
        </div>
    </div>

    {% block external_js %}{% endblock %}
</body>

</html>
